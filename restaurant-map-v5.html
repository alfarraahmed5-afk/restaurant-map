<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Map</title>
<link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Force full viewport — works in iframe too */
html { height: 100%; }
body {
  height: 100%;
  font-family: 'Satoshi','Helvetica Neue',sans-serif;
  background: #f7f6f2;
  color: #28251d;
  display: flex;
  flex-direction: column;
  overflow: hidden; /* body itself does NOT scroll */
}

:root {
  --red:#e63329; --red2:#c2221a;
  --bg:#f7f6f2; --surface:#f9f8f5;
  --divider:#dcd9d5; --border:#d4d1ca;
  --text:#28251d; --muted:#7a7974; --faint:#bab9b4;
  --r:.5rem; --rlg:.75rem; --rfull:9999px;
  --ease:180ms cubic-bezier(.16,1,.3,1);
  --display:'Cabinet Grotesk','Helvetica Neue',sans-serif;
}

/* ── HERO ── */
.hero {
  flex-shrink: 0;
  background: #1a1a1a; color: #fff;
  padding: 1.25rem 2rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.eyebrow { font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--red); margin-bottom:.2rem; }
.hero h1 { font-family:var(--display); font-size:clamp(1.2rem,2.5vw,1.9rem); font-weight:900; line-height:1.1; letter-spacing:-.03em; }
.hero-meta { font-size:.7rem; color:rgba(255,255,255,.45); margin-top:.2rem; }
.hero-meta strong { color:rgba(255,255,255,.8); }

/* ── MAIN AREA — fills ALL remaining space ── */
.main {
  flex: 1;          /* take all remaining vertical space */
  min-height: 0;    /* CRITICAL: allows flex child to shrink below content size */
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}

/* ── LIST — scrolls independently ── */
.list {
  height: 100%;     /* fill the grid cell */
  overflow-y: auto; /* THIS is the scroll container */
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 1.5rem;
  background: var(--bg);
}

/* ── MAP ── */
.map-col {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #e0ddd8;
  height: 100%;
}
.style-bar {
  flex-shrink: 0;
  display: flex; gap:.35rem; align-items:center;
  padding:.4rem .75rem;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--divider);
  overflow-x:auto; scrollbar-width:none; white-space:nowrap;
}
.style-bar::-webkit-scrollbar { display:none; }
.style-bar label { font-size:.58rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-right:.15rem; flex-shrink:0; }
.sbtn {
  font-size:.62rem; font-weight:600;
  padding:3px .55rem; border-radius:var(--rfull);
  border:1.5px solid var(--border);
  background:var(--surface); color:var(--muted);
  cursor:pointer; transition:all var(--ease); flex-shrink:0;
}
.sbtn:hover { border-color:var(--red); color:var(--red); }
.sbtn.on { background:var(--red); border-color:var(--red); color:#fff; }
#map { flex:1; min-height:0; }
.maplibregl-ctrl-attrib { font-size:9px!important; }

/* ── CARDS ── */
.card { padding:1.25rem 0; border-bottom:1px solid var(--divider); cursor:pointer; }
.card:last-of-type { border-bottom:none; }
.ch { display:grid; grid-template-columns:32px 1fr; gap:.7rem; align-items:start; }
.num {
  width:32px; height:32px; border-radius:var(--rfull);
  background:var(--text); color:#fff;
  font-family:var(--display); font-size:.75rem; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:3px;
  transition:background var(--ease),transform var(--ease);
}
.card.on .num { background:var(--red); transform:scale(1.1); }
.hood { font-size:.58rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--red); margin-bottom:.15rem; }
.cname { font-family:var(--display); font-size:clamp(.95rem,1.3vw,1.2rem); font-weight:800; line-height:1.2; letter-spacing:-.02em; transition:color var(--ease); }
.card:hover .cname { color:var(--red); }
.cphoto { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:var(--rlg); margin:.7rem 0; border:1px solid var(--divider); display:block; }
.cdesc { font-size:.78rem; color:var(--muted); line-height:1.65; max-width:50ch; }
.ctags { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.55rem; }
.ctag { font-size:.58rem; font-weight:600; background:#fff; border:1px solid var(--border); border-radius:var(--rfull); padding:2px .55rem; color:var(--muted); }
.clinks { display:flex; gap:.5rem; margin-top:.8rem; flex-wrap:wrap; }
.cl {
  display:inline-flex; align-items:center; gap:.3rem;
  font-size:.62rem; font-weight:700;
  padding:4px .75rem; border-radius:var(--rfull);
  text-decoration:none; transition:all var(--ease);
}
.cl svg { width:10px; height:10px; flex-shrink:0; }
.cl-p { background:var(--red); color:#fff; border:1.5px solid var(--red); }
.cl-p:hover { background:var(--red2); border-color:var(--red2); }
.cl-s { color:var(--text); border:1.5px solid var(--border); }
.cl-s:hover { border-color:var(--red); color:var(--red); }
.list-end { padding:2.5rem 0; text-align:center; color:var(--faint); font-size:.78rem; }

/* ── MARKERS ── */
.pin {
  width:28px; height:28px;
  border-radius:50% 50% 50% 0;
  background:var(--red);
  transform:rotate(-45deg);
  border:3px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background .15s,transform .15s;
}
.pin.on { background:#1a1a1a; transform:rotate(-45deg) scale(1.25); }
.plabel { transform:rotate(45deg); color:#fff; font-size:9px; font-weight:700; pointer-events:none; line-height:1; }

/* ── POPUP ── */
.maplibregl-popup-content { padding:0!important; border-radius:var(--rlg)!important; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.15)!important; width:195px; }
.maplibregl-popup-tip { display:none; }
.pi { width:100%; height:95px; object-fit:cover; display:block; }
.pb { padding:.55rem .7rem .7rem; }
.pn { font-size:.58rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--red); }
.pt { font-family:var(--display); font-size:.85rem; font-weight:800; line-height:1.2; }
.ph { font-size:.62rem; color:var(--muted); margin-top:1px; }
.pl { display:inline-flex; align-items:center; gap:3px; margin-top:.35rem; font-size:.62rem; font-weight:700; color:var(--red); text-decoration:none; }
.pl:hover { text-decoration:underline; }

/* ── MOBILE ── */
@media(max-width:600px){
  body { overflow:auto; }
  .main { grid-template-columns:1fr; grid-template-rows:55vw 1fr; overflow:visible; }
  .map-col { order:-1; height:55vw; }
  .list { height:auto; overflow-y:visible; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">Maps</div>
  <h1>The Essential Dubai Restaurant Guide</h1>
  <div class="hero-meta">Updated <strong>April 2026</strong> &nbsp;·&nbsp; <strong>6 locations</strong></div>
</div>

<div class="main">
  <div class="list" id="list"></div>
  <div class="map-col">
    <div class="style-bar">
      <label>Style</label>
      <button class="sbtn on" data-s="liberty">Liberty</button>
      <button class="sbtn" data-s="bright">Bright</button>
      <button class="sbtn" data-s="positron">Positron</button>
      <button class="sbtn" data-s="dark">Dark</button>
      <button class="sbtn" data-s="streets">Streets</button>
      <button class="sbtn" data-s="satellite">Satellite</button>
    </div>
    <div id="map"></div>
  </div>
</div>

<script>
const LOCS = [
  { id:1, name:'Zuma Dubai', hood:'DIFC', desc:'One of Dubai's most celebrated izakaya restaurants, known for its robata grill and world-class sake list.', tags:['Japanese','Robata','Sake'], photo:'https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=800&q=80', website:'https://zumarestaurant.com/zuma-locations/dubai/', gmaps:'https://maps.google.com/?q=Zuma+Dubai+DIFC', lat:25.2131, lng:55.2820 },
  { id:2, name:'Ossiano', hood:'Atlantis, The Palm', desc:'Dining beside an 11-million litre aquarium. One of the most decorated restaurants in the region.', tags:['Seafood','Michelin Star','Fine Dining'], photo:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80', website:'https://www.atlantis.com/dubai/atlantis-the-palm/restaurants/ossiano', gmaps:'https://maps.google.com/?q=Ossiano+Atlantis+Dubai', lat:25.1308, lng:55.1175 },
  { id:3, name:'Nobu Dubai', hood:'Atlantis, The Palm', desc:'The legendary Nobu brand at Atlantis. The black cod with miso is iconic, with views of the Arabian Gulf to match.', tags:['Japanese','Sushi','Fine Dining'], photo:'https://images.unsplash.com/photo-1611143669185-af224c5e3252?w=800&q=80', website:'https://www.noburestaurants.com/dubai/', gmaps:'https://maps.google.com/?q=Nobu+Dubai+Atlantis', lat:25.1304, lng:55.1172 },
  { id:4, name:'Pierchic', hood:'Al Qasr, Jumeirah', desc:'Dubai's most romantic table at the end of a private pier stretching into the Arabian Gulf, with Burj Al Arab views.', tags:['Seafood','Romantic','Waterfront'], photo:'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=800&q=80', website:'https://www.jumeirah.com/en/restaurants/dubai/pierchic', gmaps:'https://maps.google.com/?q=Pierchic+Dubai', lat:25.1436, lng:55.1859 },
  { id:5, name:'Ce La Vi Dubai', hood:'Address Sky View', desc:'Perched on the 55th floor with the Burj Khalifa as your backdrop. Asian-fusion cooking with Dubai's most dramatic views.', tags:['Asian Fusion','Rooftop','Views'], photo:'https://images.unsplash.com/photo-1600891964092-4316c288032e?w=800&q=80', website:'https://celavi.com/en/dubai/', gmaps:'https://maps.google.com/?q=Ce+La+Vi+Dubai', lat:25.1975, lng:55.2744 },
  { id:6, name:'Logma', hood:'Boxpark, Jumeirah', desc:'The city's most beloved Emirati café. Chebab pancakes with date syrup and karak tea — the best local food experience in Dubai.', tags:['Emirati','Breakfast','Local'], photo:'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&q=80', website:'https://www.logma.ae/', gmaps:'https://maps.google.com/?q=Logma+Boxpark+Dubai', lat:25.1938, lng:55.2397 },
];

// ── Map ──────────────────────────────────────────────────────────
const VS = { liberty:'https://tiles.openfreemap.org/styles/liberty', bright:'https://tiles.openfreemap.org/styles/bright', positron:'https://tiles.openfreemap.org/styles/positron' };
const RS = { dark:'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', streets:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', satellite:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' };
const rs = u => ({ version:8, sources:{r:{type:'raster',tiles:[u],tileSize:256}}, layers:[{id:'r',type:'raster',source:'r'}], glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf' });

const map = new maplibregl.Map({ container:'map', style:VS.liberty, center:[55.2200,25.1740], zoom:11 });
map.addControl(new maplibregl.NavigationControl(),'top-right');
map.scrollZoom.disable();

let curS='liberty';
document.querySelectorAll('.sbtn').forEach(b => b.addEventListener('click', () => {
  const s=b.dataset.s; if(s===curS) return; curS=s;
  map.setStyle(VS[s]||rs(RS[s]));
  map.once('styledata', rebuild);
  document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
}));

// ── Markers ──────────────────────────────────────────────────────
const MK={}, SVG_WEB=`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/></svg>`, SVG_PIN=`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
let pop=null, cur=null;

function pinEl(loc,on){
  const el=document.createElement('div');
  el.innerHTML=`<div class="pin${on?' on':''}"><span class="plabel">${loc.id}</span></div>`;
  return el.firstElementChild;
}
function rebuild(){
  Object.values(MK).forEach(m=>m.remove());
  LOCS.forEach(loc=>{
    const el=pinEl(loc,loc.id===cur);
    el.addEventListener('click',()=>scrollTo(loc.id));
    MK[loc.id]=new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat([loc.lng,loc.lat]).addTo(map);
  });
}
function showPop(loc){
  if(pop) pop.remove();
  pop=new maplibregl.Popup({closeButton:false,offset:30,maxWidth:'195px'})
    .setLngLat([loc.lng,loc.lat])
    .setHTML(`<img class="pi" src="${loc.photo}" onerror="this.style.display='none'" alt=""><div class="pb"><div class="pn">#${loc.id}</div><div class="pt">${loc.name}</div><div class="ph">${loc.hood}</div><a href="${loc.gmaps}" target="_blank" class="pl">${SVG_PIN} Google Maps</a></div>`)
    .addTo(map);
}
function setActive(id){
  if(cur===id) return; cur=id;
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('on',+c.dataset.id===id));
  LOCS.forEach(loc=>{ const el=pinEl(loc,loc.id===id); el.addEventListener('click',()=>scrollTo(loc.id)); MK[loc.id]?.setElement(el); });
  const loc=LOCS.find(l=>l.id===id); if(!loc) return;
  map.flyTo({center:[loc.lng,loc.lat],zoom:15,duration:800,essential:true});
  showPop(loc);
}
function scrollTo(id){
  const list=document.getElementById('list');
  const card=list.querySelector(`.card[data-id="${id}"]`);
  if(!card) return;
  list.scrollTo({top:card.offsetTop-list.clientHeight*0.2,behavior:'smooth'});
}

// ── Scroll detection ─────────────────────────────────────────────
function setupScroll(){
  const list=document.getElementById('list');
  list.addEventListener('scroll',()=>{
    const cards=[...list.querySelectorAll('.card')];
    const mid=list.scrollTop+list.clientHeight*0.4;
    let best=null,bestD=Infinity;
    cards.forEach(c=>{
      const d=Math.abs((c.offsetTop+c.offsetHeight/2)-mid);
      if(d<bestD){bestD=d;best=c;}
    });
    if(best) setActive(+best.dataset.id);
  },{passive:true});
}

// ── Build cards ──────────────────────────────────────────────────
function buildCards(){
  const list=document.getElementById('list');
  LOCS.forEach(loc=>{
    const c=document.createElement('div');
    c.className='card'; c.dataset.id=loc.id;
    c.innerHTML=`
      <div class="ch"><div class="num">${loc.id}</div><div><div class="hood">${loc.hood}</div><h2 class="cname">${loc.name}</h2></div></div>
      <img class="cphoto" src="${loc.photo}" alt="${loc.name}" loading="lazy" onerror="this.style.display='none'">
      <p class="cdesc">${loc.desc}</p>
      <div class="ctags">${loc.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
      <div class="clinks">
        <a href="${loc.website}" target="_blank" class="cl cl-p">${SVG_WEB} Website</a>
        <a href="${loc.gmaps}" target="_blank" class="cl cl-s">${SVG_PIN} Google Maps</a>
      </div>`;
    c.addEventListener('click',()=>setActive(loc.id));
    list.appendChild(c);
  });
  const e=document.createElement('div'); e.className='list-end'; e.textContent='— End of list —';
  list.appendChild(e);
}

// ── Init ─────────────────────────────────────────────────────────
buildCards();
setupScroll();
if(map.loaded()){ rebuild(); setActive(1); }
else map.on('load',()=>{ rebuild(); setActive(1); });
</script>
</body>
</html>
