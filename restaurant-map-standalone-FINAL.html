<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Map</title>
<link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Satoshi','Helvetica Neue',sans-serif; background: #f7f6f2; color: #28251d; }
img { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: inherit; }

/* ── VARIABLES ── */
:root {
  --red: #e63329; --red2: #c2221a;
  --bg: #f7f6f2; --surface: #f9f8f5;
  --divider: #dcd9d5; --border: #d4d1ca;
  --text: #28251d; --muted: #7a7974; --faint: #bab9b4;
  --radius: .5rem; --radius-lg: .75rem; --radius-full: 9999px;
  --ease: 180ms cubic-bezier(.16,1,.3,1);
  --font-display: 'Cabinet Grotesk','Helvetica Neue',sans-serif;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

.hero {
  background: #1a1a1a; color: #fff;
  padding: 1.5rem 2rem;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.hero-eyebrow {
  font-size: .65rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--red); margin-bottom: .25rem;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(1.25rem, 3vw, 2rem);
  font-weight: 900; line-height: 1.1;
  letter-spacing: -.03em;
}
.hero-meta { font-size: .75rem; color: rgba(255,255,255,.5); margin-top: .25rem; }
.hero-meta strong { color: rgba(255,255,255,.85); }

.body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }

/* ── LIST PANEL ── */
.list-panel {
  overflow-y: scroll;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  height: 100%;
  padding: 1.5rem;
  background: var(--bg);
}

/* ── MAP PANEL ── */
.map-panel { display: flex; flex-direction: column; overflow: hidden; background: #e0ddd8; }

.style-bar {
  display: flex; gap: .4rem; align-items: center;
  padding: .4rem .75rem;
  background: rgba(255,255,255,.94);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--divider);
  overflow-x: auto; scrollbar-width: none; white-space: nowrap;
  flex-shrink: 0;
}
.style-bar::-webkit-scrollbar { display: none; }
.style-bar label { font-size: .6rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-right: .2rem; flex-shrink: 0; }
.style-btn {
  font-size: .65rem; font-weight: 600;
  padding: 3px .6rem; border-radius: var(--radius-full);
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted);
  transition: all var(--ease); flex-shrink: 0;
}
.style-btn:hover { border-color: var(--red); color: var(--red); }
.style-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

#map { flex: 1; }
.maplibregl-ctrl-attrib { font-size: 9px !important; }

/* ── CARDS ── */
.card {
  padding: 1.25rem 0;
  border-bottom: 1px solid var(--divider);
  cursor: pointer;
  transition: opacity var(--ease);
}
.card:last-of-type { border-bottom: none; }
.card-header { display: grid; grid-template-columns: 34px 1fr; gap: .75rem; align-items: start; }
.card-num {
  width: 34px; height: 34px; border-radius: var(--radius-full);
  background: var(--text); color: #fff;
  font-family: var(--font-display); font-size: .8rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 3px;
  transition: background var(--ease), transform var(--ease);
}
.card.active .card-num { background: var(--red); transform: scale(1.1); }
.card-hood { font-size: .62rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: .15rem; }
.card-title {
  font-family: var(--font-display);
  font-size: clamp(1rem, 1.4vw, 1.25rem);
  font-weight: 800; line-height: 1.2; letter-spacing: -.02em;
  transition: color var(--ease);
}
.card:hover .card-title { color: var(--red); }
.card-photo { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: var(--radius-lg); margin: .75rem 0; border: 1px solid var(--divider); }
.card-desc { font-size: .8rem; color: var(--muted); line-height: 1.65; max-width: 52ch; }
.card-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .6rem; }
.card-tag { font-size: .62rem; font-weight: 600; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-full); padding: 2px .6rem; color: var(--muted); }
.card-links { display: flex; gap: .6rem; margin-top: .85rem; flex-wrap: wrap; }
.card-link {
  display: inline-flex; align-items: center; gap: .35rem;
  font-size: .65rem; font-weight: 700;
  padding: 5px .85rem; border-radius: var(--radius-full);
  text-decoration: none; transition: all var(--ease);
}
.card-link svg { width: 11px; height: 11px; flex-shrink: 0; }
.link-primary { background: var(--red); color: #fff; border: 1.5px solid var(--red); }
.link-primary:hover { background: var(--red2); border-color: var(--red2); }
.link-secondary { color: var(--text); border: 1.5px solid var(--border); }
.link-secondary:hover { border-color: var(--red); color: var(--red); }

.list-end { padding: 2.5rem 0; text-align: center; color: var(--faint); font-size: .8rem; }

/* ── MARKERS ── */
.pin {
  width: 30px; height: 30px;
  border-radius: 50% 50% 50% 0;
  background: var(--red);
  transform: rotate(-45deg);
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s, transform .15s;
}
.pin.active { background: #1a1a1a; transform: rotate(-45deg) scale(1.25); }
.pin-label { transform: rotate(45deg); color: #fff; font-size: 9px; font-weight: 700; pointer-events: none; }

/* ── POPUP ── */
.maplibregl-popup-content { padding: 0 !important; border-radius: var(--radius-lg) !important; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.15) !important; width: 200px; }
.maplibregl-popup-tip { display: none; }
.pu-img { width: 100%; height: 100px; object-fit: cover; display: block; }
.pu-body { padding: .6rem .75rem .75rem; }
.pu-num { font-size: .6rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); }
.pu-name { font-family: var(--font-display); font-size: .9rem; font-weight: 800; line-height: 1.2; }
.pu-hood { font-size: .65rem; color: var(--muted); margin-top: 1px; }
.pu-link { display: inline-flex; align-items: center; gap: 3px; margin-top: .4rem; font-size: .65rem; font-weight: 700; color: var(--red); text-decoration: none; }
.pu-link:hover { text-decoration: underline; }

/* ── STATES ── */
.loading { display: flex; align-items: center; gap: .6rem; padding: 2rem 0; color: var(--muted); font-size: .85rem; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { padding: 1.25rem; background: #fff3f3; border: 1px solid #fcc; border-radius: var(--radius-lg); margin: 1rem 0; color: var(--red); font-size: .8rem; line-height: 1.6; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .body { grid-template-columns: 1fr; grid-template-rows: 55vw 1fr; }
  .map-panel { order: -1; }
  .list-panel { height: auto; overflow-y: auto; }
  html, body { overflow: auto; }
  .app { height: auto; }
}
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="hero-eyebrow">Maps</div>
    <h1 id="hero-title">Loading…</h1>
    <div class="hero-meta" id="hero-meta"></div>
  </div>

  <div class="body">
    <div class="list-panel" id="list-panel">
      <div class="loading"><div class="spinner"></div>Loading restaurants…</div>
    </div>
    <div class="map-panel">
      <div class="style-bar">
        <label>Style</label>
        <button class="style-btn active" data-style="liberty">Liberty</button>
        <button class="style-btn" data-style="bright">Bright</button>
        <button class="style-btn" data-style="positron">Positron</button>
        <button class="style-btn" data-style="dark">Dark</button>
        <button class="style-btn" data-style="streets">Streets</button>
        <button class="style-btn" data-style="satellite">Satellite</button>
      </div>
      <div id="map"></div>
    </div>
  </div>

</div>
<script>
// ================================================================
// ⚙️ CONFIG — set your Squarespace site URL and blog slug here
// ================================================================
const CONFIG = {
  SITE_URL:   'https://jellyfish-dahlia-gx8r.squarespace.com', // ← change this
  BLOG_SLUG:  'restaurants',                        // ← change if different
  MAP_CENTER: [55.2200, 25.1740],
  MAP_ZOOM:   11,
  HERO_TITLE: 'The Essential Dubai Restaurant Guide',
  HERO_DATE:  'April 2026',
  FALLBACK:   'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&q=80',
};
// ================================================================

document.getElementById('hero-title').textContent = CONFIG.HERO_TITLE;

// ── Fetch ────────────────────────────────────────────────────────
async function load() {
  try {
    const url = `${CONFIG.SITE_URL}/${CONFIG.BLOG_SLUG}?format=json&count=200`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} — check SITE_URL and BLOG_SLUG`);
    const data = await res.json();
    return (data.items || []).map(parsePost);
  } catch(e) {
    document.getElementById('list-panel').innerHTML =
      `<div class="error-box"><strong>⚠️ Could not load restaurants.</strong><br><br>${e.message}<br><br>Make sure SITE_URL and BLOG_SLUG are set correctly in the CONFIG at the top of this file.</div>`;
    return [];
  }
}

function parsePost(post, i) {
  let meta = {};
  const body = post.body || '';
  const m = body.match(/\{[^{}]*"lat"[^{}]*\}/s);
  if (m) { try { meta = JSON.parse(m[0]); } catch(e){} }

  let photo = CONFIG.FALLBACK;
  if (post.assetUrl) photo = post.assetUrl;
  else if (post.mainImage?.assetUrl) photo = post.mainImage.assetUrl;
  else if (post.thumbnail) photo = post.thumbnail;

  const desc = (meta.description || post.excerpt || body)
    .replace(/<[^>]*>/g,'').replace(/\{[^{}]*\}/g,'').trim().slice(0,200);

  return {
    id: i+1,
    name: post.title || `Location ${i+1}`,
    hood: meta.neighborhood || post.categories?.[0] || '',
    desc,
    tags: meta.tags || post.tags || [],
    photo,
    website: meta.website || post.fullUrl || '#',
    gmaps: meta.gmaps || `https://maps.google.com/?q=${encodeURIComponent(post.title||'')}`,
    lat: parseFloat(meta.lat) || CONFIG.MAP_CENTER[1],
    lng: parseFloat(meta.lng) || CONFIG.MAP_CENTER[0],
  };
}

// ── Map ──────────────────────────────────────────────────────────
const VSTYLES = {
  liberty:  'https://tiles.openfreemap.org/styles/liberty',
  bright:   'https://tiles.openfreemap.org/styles/bright',
  positron: 'https://tiles.openfreemap.org/styles/positron',
};
const RSTYLES = {
  dark:      'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
  streets:   'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
};
function rasterStyle(url) {
  return { version:8, sources:{r:{type:'raster',tiles:[url],tileSize:256}}, layers:[{id:'r',type:'raster',source:'r'}], glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf' };
}

const map = new maplibregl.Map({
  container: 'map',
  style: VSTYLES.liberty,
  center: CONFIG.MAP_CENTER,
  zoom: CONFIG.MAP_ZOOM,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.scrollZoom.disable();

let curStyle = 'liberty';
document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = btn.dataset.style;
    if (s === curStyle) return;
    curStyle = s;
    map.setStyle(VSTYLES[s] || rasterStyle(RSTYLES[s]));
    map.once('styledata', rebuildMarkers);
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── Markers & Popups ─────────────────────────────────────────────
const markers = {};
let popup = null;
let active = null;

function pinEl(loc, isActive) {
  const el = document.createElement('div');
  el.innerHTML = `<div class="pin${isActive?' active':''}"><span class="pin-label">${loc.id}</span></div>`;
  return el.firstElementChild;
}

function rebuildMarkers() {
  Object.values(markers).forEach(m => m.remove());
  locs.forEach(loc => {
    const el = pinEl(loc, loc.id === active);
    el.addEventListener('click', () => scrollToCard(loc.id));
    markers[loc.id] = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([loc.lng, loc.lat]).addTo(map);
  });
}

function showPopup(loc) {
  if (popup) popup.remove();
  popup = new maplibregl.Popup({ closeButton:false, offset:32, maxWidth:'200px' })
    .setLngLat([loc.lng, loc.lat])
    .setHTML(`
      <img class="pu-img" src="${loc.photo}" onerror="this.style.display='none'" alt="">
      <div class="pu-body">
        <div class="pu-num">#${loc.id}</div>
        <div class="pu-name">${loc.name}</div>
        <div class="pu-hood">${loc.hood}</div>
        <a href="${loc.gmaps}" target="_blank" class="pu-link">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Google Maps
        </a>
      </div>`)
    .addTo(map);
}

function setActive(id) {
  if (active === id) return;
  active = id;
  document.querySelectorAll('.card').forEach(c =>
    c.classList.toggle('active', parseInt(c.dataset.id) === id));
  locs.forEach(loc => {
    const el = pinEl(loc, loc.id === id);
    el.addEventListener('click', () => scrollToCard(loc.id));
    markers[loc.id]?.setElement(el);
  });
  const loc = locs.find(l => l.id === id);
  if (!loc) return;
  map.flyTo({ center:[loc.lng, loc.lat], zoom:15, duration:850, essential:true });
  showPopup(loc);
}

function scrollToCard(id) {
  const panel = document.getElementById('list-panel');
  const card = panel.querySelector(`.card[data-id="${id}"]`);
  if (!card) return;
  const offset = card.offsetTop - panel.clientHeight * 0.25;
  panel.scrollTo({ top: offset, behavior: 'smooth' });
}

// ── Scroll detection — THE KEY ───────────────────────────────────
// This runs on the list-panel element directly.
// Because the panel is overflow:scroll and is a real scroll container,
// this event fires reliably with no Squarespace interference.
function setupScroll() {
  const panel = document.getElementById('list-panel');

  panel.addEventListener('scroll', () => {
    const cards = [...panel.querySelectorAll('.card')];
    const panelTop = panel.getBoundingClientRect().top;
    const target = panelTop + panel.clientHeight * 0.4;
    let best = null, bestDist = Infinity;
    cards.forEach(c => {
      const r = c.getBoundingClientRect();
      const center = r.top + r.height / 2;
      const dist = Math.abs(center - target);
      if (dist < bestDist) { bestDist = dist; best = c; }
    });
    if (best) setActive(parseInt(best.dataset.id));
  }, { passive: true });
}

// ── Build UI ─────────────────────────────────────────────────────
let locs = [];

function buildCards() {
  const panel = document.getElementById('list-panel');
  panel.innerHTML = '';
  locs.forEach(loc => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = loc.id;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-num">${loc.id}</div>
        <div>
          <div class="card-hood">${loc.hood}</div>
          <h2 class="card-title">${loc.name}</h2>
        </div>
      </div>
      ${loc.photo ? `<img class="card-photo" src="${loc.photo}" alt="${loc.name}" loading="lazy" onerror="this.style.display='none'">` : ''}
      <p class="card-desc">${loc.desc}</p>
      ${loc.tags.length ? `<div class="card-tags">${loc.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
      <div class="card-links">
        <a href="${loc.website}" target="_blank" class="card-link link-primary">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/></svg>
          Website
        </a>
        <a href="${loc.gmaps}" target="_blank" class="card-link link-secondary">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Google Maps
        </a>
      </div>`;
    card.addEventListener('click', () => setActive(loc.id));
    panel.appendChild(card);
  });
  const end = document.createElement('div');
  end.className = 'list-end'; end.textContent = '— End of list —';
  panel.appendChild(end);
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  locs = await load();
  if (!locs.length) return;

  document.getElementById('hero-meta').innerHTML =
    `Updated <strong>${CONFIG.HERO_DATE}</strong> &nbsp;·&nbsp; <strong>${locs.length} locations</strong>`;

  buildCards();
  setupScroll();

  if (map.loaded()) { rebuildMarkers(); setActive(1); }
  else map.on('load', () => { rebuildMarkers(); setActive(1); });
}

init();
</script>
</body>
</html>
